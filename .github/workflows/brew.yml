name: Deploy to Homebrew

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
    secrets:
      HOMEBREW_TOKEN:
        required: true

jobs:
  deploy-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Get release tag
        id: tag
        run: echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Download darwin binaries
        run: |
          curl -sL "https://github.com/Zarox28/Watermark/releases/download/${{ steps.tag.outputs.version }}/watermark-darwin-amd64" \
            -o watermark-darwin-amd64
          curl -sL "https://github.com/Zarox28/Watermark/releases/download/${{ steps.tag.outputs.version }}/watermark-darwin-arm64" \
            -o watermark-darwin-arm64

      - name: Compute SHA256
        id: sha
        run: |
          echo "amd64=$(sha256sum watermark-darwin-amd64 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "arm64=$(sha256sum watermark-darwin-arm64 | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v6
        with:
          repository: Zarox28/homebrew-apps
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: tap

      - name: Write formula
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          # Strip leading 'v' for the version field
          VERSION_NUM="${VERSION#v}"
          SHA_AMD64="${{ steps.sha.outputs.amd64 }}"
          SHA_ARM64="${{ steps.sha.outputs.arm64 }}"

          mkdir -p tap/Formula

          cat > tap/Formula/watermark.rb <<EOF
          class Watermark < Formula
            desc "Interactive CLI tool to add watermarks to images and PDF files"
            homepage "https://github.com/Zarox28/Watermark"
            version "${VERSION_NUM}"
            license "AGPL-3.0-only"

            on_macos do
              on_intel do
                url "https://github.com/Zarox28/Watermark/releases/download/${VERSION}/watermark-darwin-amd64"
                sha256 "${SHA_AMD64}"
              end

              on_arm do
                url "https://github.com/Zarox28/Watermark/releases/download/${VERSION}/watermark-darwin-arm64"
                sha256 "${SHA_ARM64}"
              end
            end

            def install
              binary = Hardware::CPU.intel? ? "watermark-darwin-amd64" : "watermark-darwin-arm64"
              bin.install binary => "watermark"
            end

            test do
              system "#{bin}/watermark", "--help"
            end
          end
          EOF

      - name: Update README
        run: |
          cd tap

          # Collect all formulae
          FORMULAE_LIST=""
          if [ -d "Formula" ]; then
            for file in Formula/*.rb; do
              [ -f "$file" ] || continue
              name=$(basename "$file" .rb)
              desc=$(grep -m1 'desc ' "$file" | sed 's/.*desc "\(.*\)"/\1/')
              FORMULAE_LIST="${FORMULAE_LIST}- \`${name}\`: ${desc}\n"
            done
          fi

          # Collect all casks
          CASKS_LIST=""
          if [ -d "Casks" ]; then
            for file in Casks/*.rb; do
              [ -f "$file" ] || continue
              name=$(basename "$file" .rb)
              desc=$(grep -m1 'desc ' "$file" | sed 's/.*desc "\(.*\)"/\1/')
              CASKS_LIST="${CASKS_LIST}- \`${name}\`: ${desc}\n"
            done
          fi

          # Rebuild the README
          cat > README.md <<EOF
          # Homebrew Tap for [Zarox28](http://github.com/Zarox28)
          Welcome to the Homebrew tap for **Zarox28**!
          This repository provides additional formulae for Homebrew, the package manager for macOS and Linux.

          ## Installation
          To use this tap, you need to add it to your Homebrew configuration. You can do this with the following command:
          \`\`\`sh
          brew tap zarox28/apps
          \`\`\`

          ## Available Formulae
          Here is a list of the formulae available in this tap:

          $(echo -e "$FORMULAE_LIST")
          ## Available Casks
          Here is a list of the casks available in this tap:

          $(echo -e "$CASKS_LIST")
          To install from this tap, use:
          \`\`\`sh
          brew install zarox28/apps/<formula>
          \`\`\`
          Replace \`<formula>\` with the name of the formula or cask you want to install.

          ## Issues
          If you encounter any issues or have questions, please open an issue on this repository. I will do my best to help you out!

          ## Author
          This tap is maintained by [Zarox28](http://github.com/Zarox28).

          Happy brewing!
          EOF

      - name: Commit and push formula
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/watermark.rb README.md
          git commit -m "🍺 watermark ${{ steps.tag.outputs.version }}"
          git push

name: Build & Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  Build:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Build all targets
        run: |
          echo "Building linux/amd64..."
          GOOS=linux  GOARCH=amd64 go build -o ./build/watermark-linux-amd64  .
          echo "Building linux/arm64..."
          GOOS=linux  GOARCH=arm64 go build -o ./build/watermark-linux-arm64  .
          echo "Building darwin/amd64..."
          GOOS=darwin GOARCH=amd64 go build -o ./build/watermark-darwin-amd64 .
          echo "Building darwin/arm64..."
          GOOS=darwin GOARCH=arm64 go build -o ./build/watermark-darwin-arm64 .
          echo "All targets built successfully"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: builds
          path: ./build/*

  Tag-and-Release:
    needs: Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./build
          merge-multiple: true

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v

      - name: Create new release
        if: ${{ steps.tag_version.outputs.new_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Watermark (${{ steps.tag_version.outputs.new_tag }})
          body: |
            Release **${{ steps.tag_version.outputs.new_tag }}**

            ${{ steps.tag_version.outputs.changelog }}

            ---
            Commit: ${{ github.sha }}
          files: ./build/*
          draft: false
          prerelease: false
          make_latest: true

  Deploy-Formula:
    needs: Tag-and-Release
    if: ${{ needs.Tag-and-Release.outputs.new_tag != '' }}
    uses: ./.github/workflows/brew.yml
    with:
      version: ${{ needs.Tag-and-Release.outputs.new_tag }}
    secrets:
      HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
